title: Suspicious PowerShell Encoded Command Execution
id: 9e0f1a2b-3456-4c7d-de89-0f1a2b3c4d5e
status: experimental
description: Detects PowerShell being executed with an encoded command parameter, a common technique used to obfuscate malicious scripts and evade simple string-based detection.
author: YourName
date: 2026/07/05
references:
    - https://attack.mitre.org/techniques/T1059/001/
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - '-enc '
            - '-EncodedCommand'
            - '-e '
    condition: selection
falsepositives:
    - Legitimate administrative scripts that use encoded commands for complex parameters
    - Software deployment tools that launch PowerShell with encoded arguments
level: high