title: Password Spraying Correlation
id: 6d7e8f9a-0123-4b4c-cd56-7e8f9a0b1c2d
status: experimental
description: Triggers when a single source IP has failed login attempts against 10+ distinct user accounts within 10 minutes.
correlation:
    type: value_count
    rules:
        - 5c6d7e8f-9012-4a3b-bc45-6d7e8f9a0b1c
    group-by:
        - SourceIp
    timespan: 10m
    condition:
        gte: 10
        field: TargetUserName
level: high