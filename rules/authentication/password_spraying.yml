title: Possible Password Spraying Attack
id: 5c6d7e8f-9012-4a3b-bc45-6d7e8f9a0b1c
status: experimental
description: Detects a single source attempting logins against many different user accounts with few attempts each, a pattern typical of password spraying (as opposed to brute-force, which targets one account with many attempts).
author: letxworld
date: 2026/07/03
references:
    - https://attack.mitre.org/techniques/T1110/003/
tags:
    - attack.credential_access
    - attack.t1110.003
logsource:
    category: authentication
    product: windows
detection:
    selection:
        EventID: 4625
    condition: selection
falsepositives:
    - Shared service accounts with legitimate multi-user access failures
level: medium