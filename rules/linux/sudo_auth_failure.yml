title: Repeated Sudo Authentication Failures
id: 3c4d5e6f-7a8b-4c9d-0e1f-2a3b4c5d6e7f
status: experimental
description: Detects a user repeatedly failing sudo authentication, which may indicate a compromised account being used to attempt privilege escalation.
author: Dipesh Pokhrel
date: 2026/07/10
references:
    - https://attack.mitre.org/techniques/T1548/003/
tags:
    - attack.privilege_escalation
    - attack.t1548.003
logsource:
    category: authentication
    product: linux
    service: sudo
detection:
    selection:
        message|contains: 'pam_unix(sudo:auth): authentication failure'
    condition: selection
falsepositives:
    - Legitimate users mistyping their own password
level: high
